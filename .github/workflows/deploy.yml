name: Deploy Fox Replay

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild and restart container
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d

      - name: Verify container is running
        run: docker compose ps
