name: Deploy Fox Replay

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Fix directory ownership
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure LF line endings for Docker files
        run: |
          sed -i 's/\r$//' entrypoint.sh nginx.conf

      - name: Rebuild and restart container
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d

      - name: Verify container is running
        run: docker compose ps
